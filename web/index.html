<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcoder Control Panel</title>
    <style>
        :root {
            --bg-0: #f4f8fb;
            --bg-1: #e9f4f6;
            --ink-0: #0f1720;
            --ink-1: #415364;
            --card: #ffffff;
            --brand: #127a88;
            --brand-2: #0e6773;
            --line: #d6e2ea;
            --good-bg: #e8f8ef;
            --good-ink: #1f6b42;
            --bad-bg: #ffeef0;
            --bad-ink: #9b1c2b;
            --info-bg: #eaf4ff;
            --info-ink: #195ea8;
            --warn-bg: #fff8e8;
            --warn-ink: #8a5a0f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", "Avenir Next", "Helvetica Neue", sans-serif;
            color: var(--ink-0);
            background:
                radial-gradient(1200px 600px at 10% -10%, #d8f4ff 0%, transparent 50%),
                radial-gradient(1000px 500px at 110% 0%, #d5ffe9 0%, transparent 45%),
                linear-gradient(180deg, var(--bg-1), var(--bg-0));
            min-height: 100vh;
            padding: 24px;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 18px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(28, 62, 75, 0.08);
            padding: 20px;
        }

        .panel + .panel {
            margin-top: 14px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--ink-1);
            margin-bottom: 14px;
            line-height: 1.35;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 7px;
            color: #1b3644;
        }

        input,
        select,
        textarea,
        button {
            font: inherit;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            border: 1px solid #c7d5df;
            border-radius: 10px;
            padding: 10px 12px;
            background: #ffffff;
            color: var(--ink-0);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(18, 122, 136, 0.18);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-drop {
            border: 2px dashed #8fb2c1;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            color: #2f5c70;
            background: #f8fcff;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-drop.drag {
            border-color: var(--brand);
            background: #eefbfd;
        }

        input[type="file"] {
            display: none;
        }

        .file-meta {
            display: none;
            margin-top: 10px;
            background: #f2fbf4;
            border: 1px solid #c8e7cf;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            color: #2b5e39;
            word-break: break-word;
        }

        .file-meta.show {
            display: block;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.2s ease;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--brand-2);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #c83a4b;
            color: #fff;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ab2d3d;
        }

        .btn-soft {
            background: #edf3f7;
            color: #234355;
            border: 1px solid #c8d7e1;
        }

        .btn-soft:hover:not(:disabled) {
            background: #e3edf4;
        }

        .status {
            margin-top: 12px;
            border-radius: 10px;
            padding: 12px;
            line-height: 1.35;
            display: none;
            font-size: 14px;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: var(--info-bg);
            color: var(--info-ink);
        }

        .status.success {
            background: var(--good-bg);
            color: var(--good-ink);
        }

        .status.error {
            background: var(--bad-bg);
            color: var(--bad-ink);
        }

        .status.warn {
            background: var(--warn-bg);
            color: var(--warn-ink);
        }

        .progress-wrap {
            margin-top: 12px;
            background: #e8eff3;
            border-radius: 999px;
            overflow: hidden;
            height: 10px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #118a99, #1fbe90);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .kv {
            margin-top: 12px;
            font-size: 14px;
            border: 1px solid #dde8ef;
            border-radius: 10px;
            padding: 10px;
            background: #fcfeff;
        }

        .kv .row {
            padding: 4px 0;
            border-bottom: 1px dashed #e4edf3;
        }

        .kv .row:last-child {
            border-bottom: 0;
        }

        .k {
            color: #2e4f62;
            font-weight: 700;
            margin-right: 6px;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            word-break: break-word;
        }

        .side-card {
            position: sticky;
            top: 18px;
            height: fit-content;
        }

        .small {
            font-size: 12px;
            color: #4d6675;
        }

        .result-link {
            display: block;
            margin-top: 8px;
            color: #0f6c7a;
            text-decoration: none;
            word-break: break-all;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 980px) {
            .page {
                grid-template-columns: 1fr;
            }

            .side-card {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            body {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div>
            <section class="panel">
                <h1>Transcoder</h1>
                <p class="subtitle">Full upload workflow: multipart initiation, part uploads, completion metadata, queue status tracking, and cancellation.</p>

                <div class="field">
                    <label>Video file</label>
                    <label for="videoFile" class="file-drop" id="fileDrop">Click or drop a video file here</label>
                    <input id="videoFile" type="file" accept="video/*">
                    <div class="file-meta" id="selectedFile"></div>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="videoName">Video name</label>
                        <input id="videoName" type="text" placeholder="My Event Clip">
                    </div>
                    <div class="field">
                        <label for="format">Output format</label>
                        <select id="format">
                            <option value="mp4">mp4</option>
                            <option value="mov">mov</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Optional description of this upload"></textarea>
                </div>

                <div class="grid-3">
                    <div class="field">
                        <label for="codec">Codec</label>
                        <select id="codec">
                            <option value="h264">h264</option>
                            <option value="h265">h265</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="resolution">Resolution</label>
                        <select id="resolution">
                            <option value="1080">1080p</option>
                            <option value="720">720p</option>
                            <option value="480">480p</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="framerate">Framerate (fps)</label>
                        <input id="framerate" type="number" min="1" max="240" value="30">
                    </div>
                    <div class="field">
                        <label for="duration">Duration (seconds)</label>
                        <input id="duration" type="number" min="1" value="60">
                    </div>
                </div>

                <div class="grid-3">
                    <div class="field">
                        <label for="partSize">Part size (MB, min 5)</label>
                        <input id="partSize" type="number" min="5" value="64">
                    </div>
                    <div class="field">
                        <label for="maxRetries">Part retries</label>
                        <input id="maxRetries" type="number" min="1" max="10" value="3">
                    </div>
                    <div class="field">
                        <label for="partTimeout">Part timeout (sec)</label>
                        <input id="partTimeout" type="number" min="5" max="900" value="120">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" id="uploadBtn">Start Upload</button>
                    <button class="btn btn-danger" id="cancelBtn" disabled>Cancel Job</button>
                    <button class="btn btn-soft" id="pollBtn" disabled>Poll Status Now</button>
                </div>

                <div id="status" class="status"></div>
                <div class="progress-wrap">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="uploadResult" class="kv" style="display:none;"></div>
            </section>
        </div>

        <aside class="side-card">
            <section class="panel">
                <h2>Job Tools</h2>
                <p class="small">Check any existing job and fetch source/output links or trigger direct download.</p>

                <div class="field">
                    <label for="lookupJobId">Job ID</label>
                    <input id="lookupJobId" type="text" placeholder="JB-...">
                </div>

                <div class="actions" style="margin-bottom:10px;">
                    <button class="btn btn-soft" id="lookupStatusBtn">Get Status</button>
                    <button class="btn btn-soft" id="getSourceBtn">Source URL</button>
                    <button class="btn btn-soft" id="getOutputBtn">Output URL</button>
                </div>

                <div class="actions">
                    <button class="btn btn-soft" id="downloadBtn">Download Stream</button>
                </div>

                <div id="jobToolStatus" class="status"></div>
                <div id="jobToolResult" class="kv" style="display:none;"></div>
            </section>
        </aside>
    </div>

    <script>
        const ui = {
            videoFile: document.getElementById('videoFile'),
            fileDrop: document.getElementById('fileDrop'),
            selectedFile: document.getElementById('selectedFile'),
            videoName: document.getElementById('videoName'),
            description: document.getElementById('description'),
            format: document.getElementById('format'),
            codec: document.getElementById('codec'),
            resolution: document.getElementById('resolution'),
            framerate: document.getElementById('framerate'),
            duration: document.getElementById('duration'),
            partSize: document.getElementById('partSize'),
            maxRetries: document.getElementById('maxRetries'),
            partTimeout: document.getElementById('partTimeout'),
            uploadBtn: document.getElementById('uploadBtn'),
            cancelBtn: document.getElementById('cancelBtn'),
            pollBtn: document.getElementById('pollBtn'),
            status: document.getElementById('status'),
            progressBar: document.getElementById('progressBar'),
            uploadResult: document.getElementById('uploadResult'),
            lookupJobId: document.getElementById('lookupJobId'),
            lookupStatusBtn: document.getElementById('lookupStatusBtn'),
            getSourceBtn: document.getElementById('getSourceBtn'),
            getOutputBtn: document.getElementById('getOutputBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            jobToolStatus: document.getElementById('jobToolStatus'),
            jobToolResult: document.getElementById('jobToolResult'),
        };

        const state = {
            file: null,
            isUploading: false,
            uploadCancelledLocally: false,
            currentJobId: null,
            uploadId: null,
            parts: [],
            etags: [],
            uploadAbortController: null,
            pollTimer: null,
            pollInFlight: false,
            pollCycle: 0,
            currentStatus: null,
        };

        function formatFileSize(bytes) {
            if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = bytes;
            let idx = 0;
            while (size >= 1024 && idx < units.length - 1) {
                size /= 1024;
                idx += 1;
            }
            return `${size.toFixed(size < 10 && idx > 0 ? 1 : 0)} ${units[idx]}`;
        }

        function setStatus(message, type = 'info') {
            ui.status.className = `status show ${type}`;
            ui.status.textContent = message;
        }

        function setJobToolStatus(message, type = 'info') {
            ui.jobToolStatus.className = `status show ${type}`;
            ui.jobToolStatus.textContent = message;
        }

        function setProgress(percent) {
            const safe = Math.max(0, Math.min(100, Number(percent) || 0));
            ui.progressBar.style.width = `${safe}%`;
        }

        function resetUploadResult() {
            ui.uploadResult.style.display = 'none';
            ui.uploadResult.innerHTML = '';
        }

        function renderUploadResult(rows, links = []) {
            const htmlRows = rows.map(([k, v]) => `
                <div class="row"><span class="k">${k}:</span><span class="mono">${v}</span></div>
            `).join('');

            const htmlLinks = links.map(([label, href]) => `
                <a class="result-link" href="${href}" target="_blank" rel="noopener noreferrer">${label}: ${href}</a>
            `).join('');

            ui.uploadResult.innerHTML = htmlRows + htmlLinks;
            ui.uploadResult.style.display = 'block';
        }

        function renderJobToolResult(rows, links = []) {
            const htmlRows = rows.map(([k, v]) => `
                <div class="row"><span class="k">${k}:</span><span class="mono">${v}</span></div>
            `).join('');

            const htmlLinks = links.map(([label, href]) => `
                <a class="result-link" href="${href}" target="_blank" rel="noopener noreferrer">${label}: ${href}</a>
            `).join('');

            ui.jobToolResult.innerHTML = htmlRows + htmlLinks;
            ui.jobToolResult.style.display = 'block';
        }

        function applySelectedFile(file) {
            state.file = file || null;
            if (!state.file) {
                ui.selectedFile.classList.remove('show');
                ui.selectedFile.textContent = '';
                return;
            }
            ui.selectedFile.classList.add('show');
            ui.selectedFile.textContent = `Selected: ${state.file.name} (${formatFileSize(state.file.size)})`;

            if (!ui.videoName.value.trim()) {
                ui.videoName.value = state.file.name.replace(/\.[^.]+$/, '');
            }
            const extension = state.file.name.split('.').pop().toLowerCase();
            if (extension === 'mp4' || extension === 'mov') {
                ui.format.value = extension;
            }
        }

        function parseEtag(headers) {
            const candidates = [headers.get('ETag'), headers.get('etag')].filter(Boolean);
            if (candidates.length === 0) return null;
            return candidates[0].replace(/^"(.+)"$/, '$1');
        }

        async function apiJson(url, init = {}) {
            const resp = await fetch(url, init);
            let payload = null;
            try {
                payload = await resp.json();
            } catch (err) {
                payload = null;
            }
            return { resp, payload };
        }

        async function cancelCurrentJob(reasonFrom = null) {
            if (!state.currentJobId) {
                setStatus('No active job to cancel.', 'warn');
                return;
            }

            const from = reasonFrom || state.currentStatus || 'pending';
            const body = JSON.stringify({ id: state.currentJobId, from, to: 'cancelled' });
            const { resp, payload } = await apiJson(`/status/${encodeURIComponent(state.currentJobId)}/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body,
            });

            if (!resp.ok || !payload || !payload.success) {
                const msg = payload?.error || payload?.message || `Cancel failed (${resp.status})`;
                setStatus(msg, 'error');
                return;
            }

            state.currentStatus = 'cancelled';
            setStatus(`Job ${state.currentJobId} cancelled.`, 'warn');
            renderUploadResult([
                ['Job ID', state.currentJobId],
                ['Status', 'cancelled'],
                ['Message', payload.message || 'Cancelled'],
            ]);
        }

        async function pollStatusOnce(showInfo = true) {
            if (!state.currentJobId) {
                if (showInfo) setStatus('No current job yet.', 'warn');
                return null;
            }

            if (state.pollInFlight) {
                if (showInfo) setStatus('Status check already in progress. Please wait...', 'info');
                return null;
            }

            state.pollInFlight = true;
            try {
                const { resp, payload } = await apiJson(`/status/${encodeURIComponent(state.currentJobId)}/update`);
                if (!resp.ok || !payload || !payload.success) {
                    if (showInfo) setStatus(payload?.error || payload?.message || `Status fetch failed (${resp.status})`, 'error');
                    return null;
                }

                const jobStatus = payload?.metadata?.status || 'unknown';
                state.currentStatus = jobStatus;
                if (showInfo) {
                    const statusType = jobStatus === 'completed' ? 'success' : (jobStatus === 'failed' || jobStatus === 'cancelled' ? 'error' : 'info');
                    setStatus(`Job ${state.currentJobId} status: ${jobStatus}`, statusType);
                }
                return jobStatus;
            } finally {
                state.pollInFlight = false;
            }
        }

        function stopAutoPolling() {
            state.pollCycle += 1;
            if (state.pollTimer) {
                clearTimeout(state.pollTimer);
                state.pollTimer = null;
            }
        }

        function startAutoPolling() {
            stopAutoPolling();
            const cycle = state.pollCycle;
            const run = async () => {
                if (cycle !== state.pollCycle) return;

                const status = await pollStatusOnce(false);
                if (cycle !== state.pollCycle) return;
                if (!status) {
                    state.pollTimer = setTimeout(run, 3000);
                    return;
                }

                if (status === 'completed') {
                    stopAutoPolling();
                    setStatus(`Job ${state.currentJobId} completed. Output URL is now available.`, 'success');
                } else if (status === 'failed' || status === 'cancelled') {
                    stopAutoPolling();
                    setStatus(`Job ${state.currentJobId} finished with status: ${status}`, status === 'cancelled' ? 'warn' : 'error');
                } else {
                    state.pollTimer = setTimeout(run, 3000);
                }
            };

            state.pollTimer = setTimeout(run, 3000);
        }

        async function uploadPartWithRetries(part, partBlob, timeoutSec, maxRetries) {
            let attempt = 0;
            let lastError = null;

            while (attempt < maxRetries) {
                attempt += 1;
                let timeoutId = null;
                let globalController = null;
                let abortOnGlobalCancel = null;
                try {
                    const requestController = new AbortController();
                    globalController = state.uploadAbortController;
                    abortOnGlobalCancel = () => requestController.abort();
                    if (globalController) {
                        globalController.signal.addEventListener('abort', abortOnGlobalCancel, { once: true });
                    }

                    timeoutId = setTimeout(() => requestController.abort(), timeoutSec * 1000);

                    const resp = await fetch(part.url, {
                        method: 'PUT',
                        body: partBlob,
                        headers: { 'Content-Type': 'application/octet-stream' },
                        signal: requestController.signal,
                    });

                    if (!resp.ok) {
                        throw new Error(`HTTP ${resp.status}`);
                    }

                    const etag = parseEtag(resp.headers);
                    if (!etag) {
                        throw new Error('Missing ETag');
                    }

                    return etag;
                } catch (err) {
                    lastError = err;
                    if (state.uploadCancelledLocally || state.uploadAbortController?.signal.aborted) {
                        throw new Error('Upload cancelled locally');
                    }
                    if (attempt < maxRetries) {
                        await new Promise((resolve) => setTimeout(resolve, 300 * attempt));
                    }
                } finally {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                    }
                    if (globalController && abortOnGlobalCancel) {
                        globalController.signal.removeEventListener('abort', abortOnGlobalCancel);
                    }
                }
            }

            throw lastError || new Error(`Failed part ${part.part_number}`);
        }

        function setButtonsForUpload(active) {
            ui.uploadBtn.disabled = active;
            ui.cancelBtn.disabled = !active;
            ui.pollBtn.disabled = !state.currentJobId;
            state.isUploading = active;
        }

        async function startUpload() {
            if (!state.file) {
                setStatus('Please select a video file first.', 'error');
                return;
            }

            resetUploadResult();
            stopAutoPolling();
            state.uploadCancelledLocally = false;
            state.etags = [];
            state.parts = [];
            state.currentStatus = 'pending';
            state.uploadAbortController = new AbortController();
            setProgress(0);
            setButtonsForUpload(true);

            const partSizeMb = Math.max(5, Number(ui.partSize.value) || 64);
            const partSizeBytes = Math.floor(partSizeMb * 1024 * 1024);
            const maxRetries = Math.max(1, Number(ui.maxRetries.value) || 3);
            const timeoutSec = Math.max(5, Number(ui.partTimeout.value) || 120);

            try {
                setStatus('Initiating multipart upload...', 'info');

                const initiateBody = JSON.stringify({
                    file_name: state.file.name,
                    file_size: state.file.size,
                    part_size: partSizeBytes,
                });

                const { resp: initResp, payload: initData } = await apiJson('/upload/initiate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: initiateBody,
                });

                if (!initResp.ok || !initData || !initData.success) {
                    throw new Error(initData?.error || initData?.message || `Initiate failed (${initResp.status})`);
                }

                state.currentJobId = initData?.metadata?.job_id || null;
                state.uploadId = initData?.metadata?.upload_id || null;
                state.parts = initData?.metadata?.parts || [];
                state.currentStatus = 'pending';

                if (!state.currentJobId || !state.uploadId || !Array.isArray(state.parts) || state.parts.length === 0) {
                    throw new Error('Missing job_id/upload_id/parts from initiation response');
                }

                ui.lookupJobId.value = state.currentJobId;
                ui.pollBtn.disabled = false;

                setStatus(`Upload initiated. Job ${state.currentJobId}. Uploading ${state.parts.length} parts...`, 'info');

                for (let idx = 0; idx < state.parts.length; idx += 1) {
                    if (state.uploadCancelledLocally) {
                        throw new Error('Upload cancelled');
                    }

                    const part = state.parts[idx];
                    const partSize = partSizeBytes;
                    const start = (part.part_number - 1) * partSize;
                    const end = Math.min(start + partSize, state.file.size);
                    const blob = state.file.slice(start, end);

                    const etag = await uploadPartWithRetries(part, blob, timeoutSec, maxRetries);
                    state.etags.push({ part_number: part.part_number, etag });

                    const pct = ((idx + 1) / state.parts.length) * 100;
                    setProgress(pct);
                    setStatus(`Uploaded part ${idx + 1}/${state.parts.length} (${Math.round(pct)}%)`, 'info');
                }

                setStatus('Completing multipart upload and saving metadata...', 'info');

                const completeBody = JSON.stringify({
                    job_id: state.currentJobId,
                    upload_id: state.uploadId,
                    parts: state.etags,
                    video_name: ui.videoName.value.trim() || state.file.name.replace(/\.[^.]+$/, ''),
                    description: ui.description.value.trim(),
                    format: ui.format.value,
                    codec: ui.codec.value,
                    resolution: ui.resolution.value,
                    framerate: Number(ui.framerate.value) || 30,
                    duration: Number(ui.duration.value) || 60,
                });

                const { resp: completeResp, payload: completeData } = await apiJson('/upload/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: completeBody,
                });

                if (!completeResp.ok || !completeData || !completeData.success) {
                    throw new Error(completeData?.error || completeData?.message || `Complete failed (${completeResp.status})`);
                }

                state.currentStatus = 'queued';
                setProgress(100);
                setStatus(`Upload complete for ${state.currentJobId}. Job queued for transcoding.`, 'success');

                renderUploadResult([
                    ['Job ID', state.currentJobId],
                    ['Upload ID', state.uploadId],
                    ['Parts uploaded', String(state.etags.length)],
                    ['Format', ui.format.value],
                    ['Codec', ui.codec.value],
                    ['Resolution', `${ui.resolution.value}p`],
                    ['Framerate', `${Number(ui.framerate.value) || 30} fps`],
                    ['Duration', `${Number(ui.duration.value) || 60} sec`],
                    ['Server message', completeData.message || 'Queued'],
                ]);

                startAutoPolling();
            } catch (err) {
                const msg = err instanceof Error ? err.message : String(err);
                const cancelled = msg.toLowerCase().includes('cancel');
                setStatus(cancelled ? 'Upload cancelled.' : `Upload failed: ${msg}`, cancelled ? 'warn' : 'error');

                if (cancelled && state.currentJobId) {
                    try {
                        await cancelCurrentJob(state.currentStatus || 'pending');
                    } catch (_) {
                        // best-effort cancel only
                    }
                }
            } finally {
                state.uploadAbortController = null;
                setButtonsForUpload(false);
                ui.cancelBtn.disabled = !state.currentJobId;
            }
        }

        async function lookupStatus() {
            const jobId = ui.lookupJobId.value.trim() || state.currentJobId;
            if (!jobId) {
                setJobToolStatus('Enter a job ID first.', 'warn');
                return;
            }

            const { resp, payload } = await apiJson(`/status/${encodeURIComponent(jobId)}/update`);
            if (!resp.ok || !payload || !payload.success) {
                setJobToolStatus(payload?.error || payload?.message || `Status fetch failed (${resp.status})`, 'error');
                return;
            }

            const status = payload?.metadata?.status || 'unknown';
            if (jobId === state.currentJobId) state.currentStatus = status;
            setJobToolStatus(`Job ${jobId} status: ${status}`, 'info');
            renderJobToolResult([
                ['Job ID', jobId],
                ['Status', status],
            ]);
        }

        async function fetchSourceUrl() {
            const jobId = ui.lookupJobId.value.trim() || state.currentJobId;
            if (!jobId) {
                setJobToolStatus('Enter a job ID first.', 'warn');
                return;
            }

            const { resp, payload } = await apiJson(`/jobs/${encodeURIComponent(jobId)}/source-url`);
            if (!resp.ok || !payload || !payload.success) {
                setJobToolStatus(payload?.error || payload?.message || `Source URL fetch failed (${resp.status})`, 'error');
                return;
            }

            const sourceUrl = payload?.metadata?.source_url;
            setJobToolStatus('Source URL fetched.', 'success');
            renderJobToolResult([
                ['Job ID', jobId],
                ['Type', 'source'],
            ], sourceUrl ? [['Open Source URL', sourceUrl]] : []);
        }

        async function fetchOutputUrl() {
            const jobId = ui.lookupJobId.value.trim() || state.currentJobId;
            if (!jobId) {
                setJobToolStatus('Enter a job ID first.', 'warn');
                return;
            }

            const { resp, payload } = await apiJson(`/jobs/${encodeURIComponent(jobId)}/output-url`);
            if (!resp.ok || !payload || !payload.success) {
                const level = resp.status === 409 ? 'warn' : 'error';
                setJobToolStatus(payload?.error || payload?.message || `Output URL fetch failed (${resp.status})`, level);
                return;
            }

            const outputUrl = payload?.metadata?.output_url;
            const objectKey = payload?.metadata?.object_key || '';
            setJobToolStatus('Output URL fetched.', 'success');
            renderJobToolResult([
                ['Job ID', jobId],
                ['Object', objectKey],
            ], outputUrl ? [['Open Output URL', outputUrl]] : []);
        }

        function triggerDownload() {
            const jobId = ui.lookupJobId.value.trim() || state.currentJobId;
            if (!jobId) {
                setJobToolStatus('Enter a job ID first.', 'warn');
                return;
            }

            window.open(`/jobs/${encodeURIComponent(jobId)}/download`, '_blank', 'noopener');
            setJobToolStatus(`Download stream requested for ${jobId}.`, 'info');
        }

        ui.uploadBtn.addEventListener('click', startUpload);

        ui.cancelBtn.addEventListener('click', async () => {
            if (!state.currentJobId) return;
            state.uploadCancelledLocally = true;
            if (state.uploadAbortController) {
                state.uploadAbortController.abort('user_cancelled');
            }
            try {
                await cancelCurrentJob(state.currentStatus || 'pending');
            } catch (_) {
                // best effort
            }
        });

        ui.pollBtn.addEventListener('click', async () => {
            await pollStatusOnce(true);
        });

        ui.lookupStatusBtn.addEventListener('click', lookupStatus);
        ui.getSourceBtn.addEventListener('click', fetchSourceUrl);
        ui.getOutputBtn.addEventListener('click', fetchOutputUrl);
        ui.downloadBtn.addEventListener('click', triggerDownload);

        ui.videoFile.addEventListener('change', () => {
            applySelectedFile(ui.videoFile.files[0]);
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            ui.fileDrop.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                ui.fileDrop.classList.add('drag');
            });
        });

        ['dragleave', 'drop'].forEach((eventName) => {
            ui.fileDrop.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                ui.fileDrop.classList.remove('drag');
            });
        });

        ui.fileDrop.addEventListener('drop', (event) => {
            const files = event.dataTransfer?.files;
            if (!files || !files.length) return;
            ui.videoFile.files = files;
            applySelectedFile(files[0]);
        });
    </script>
</body>
</html>
